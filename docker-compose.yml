# OPASSIT 本地开发 - Django · 跨 Windows / Linux
# 使用: docker compose up -d

services:
  web:
    build: .
    ports:
      - "8080:8000"
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: opassit
      MYSQL_PASSWORD: opassit
      MYSQL_DATABASE: opassit
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: opassit
      MYSQL_USER: opassit
      MYSQL_PASSWORD: opassit
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
